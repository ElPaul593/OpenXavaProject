trigger:
- main

pool:
  name: 'Default'

steps:
- powershell: |
    java -version
    mvn -version
  displayName: 'Verificar Java y Maven'

- powershell: |
    mvn test
  displayName: 'Ejecutar pruebas automatizadas con Maven'

- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    testRunTitle: 'Pruebas automatizadas de asistencia'
  displayName: 'Publicar resultados JUnit'
